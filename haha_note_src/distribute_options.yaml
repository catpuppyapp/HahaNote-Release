output: dist/
variables:
# FLUTTER_ROOT: ~/fvm/versions/3.16.5
# PGYER_API_KEY: your api key
releases:
  - name: prod
    jobs:
      - name: android-apk
        package:
          platform: android
          target: apk
          build_args:
            target-platform: android-arm,android-arm64,android-x86_64
            obfuscate: true
            split-debug-info: build/symbols/android
      - name: linux-appimage
        package:
          platform: linux
          target: appimage
          build_args:
            obfuscate: true
            split-debug-info: build/symbols/linux_appimage
      - name: linux-deb
        package:
          platform: linux
          target: deb
          build_args:
            obfuscate: true
            split-debug-info: build/symbols/linux_deb
      - name: linux-zip
        package:
          platform: linux
          target: zip
          build_args:
            obfuscate: true
            split-debug-info: build/symbols/linux_zip
      - name: windows-exe
        package:
          platform: windows
          target: exe
          build_args:
            obfuscate: true
            split-debug-info: build/symbols/windows_exe
      - name: windows-zip
        package:
          platform: windows
          target: zip
          build_args:
            obfuscate: true
            split-debug-info: build/symbols/windows_zip
